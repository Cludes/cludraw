<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Cludraw - a shared canvas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span> Cludraw</div>
    <div class="meta"><span id="status" class="off">connecting…</span><span class="sep">·</span><b id="online">0</b> drawing<span class="sep">·</span>resets daily 00:00 UTC</div>
  </header>

  <main><canvas id="c" width="160" height="160"></canvas></main>

  <div class="bar">
    <div class="sec">
      <span class="lbl">Brush</span>
      <div id="brushes" class="brushes"></div>
      <button id="eraser" class="tool" title="Erase">Eraser</button>
    </div>
    <div class="sec colors">
      <div id="swatches" class="swatches"></div>
      <label class="picker" title="Custom colour"><input type="color" id="picker" value="#e50000" /></label>
    </div>
    <div class="sec">
      <button id="vote" class="tool vote">Vote to wipe <span id="votecount">0/2</span></button>
    </div>
  </div>
  <p class="hint">Click or drag to draw together. Be nice - it's shared, and it wipes daily (or when enough people vote).</p>

  <script src="app.js"></script>
</body>
</html>
